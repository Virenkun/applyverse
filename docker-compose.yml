services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobscrap
      POSTGRES_PASSWORD: jobscrap
      POSTGRES_DB: jobscrap
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscrap"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://jobscrap:jobscrap@db:5432/jobscrap
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/companies.yaml:/code/companies.yaml

  worker:
    build: ./backend
    command: python -m app.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://jobscrap:jobscrap@db:5432/jobscrap
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/companies.yaml:/code/companies.yaml

  web:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time; browser requests hit
        # the host-published API port
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
