# Production overlay: single nginx entrypoint on :80, web + API same-origin.
# Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  db:
    # Don't expose Postgres to the internet in prod
    ports: !reset []
    restart: unless-stopped

  redis:
    ports: !reset []
    restart: unless-stopped

  api:
    # Reachable only inside the compose network (via nginx)
    ports: !reset []
    environment:
      CORS_ORIGINS: "*"
    restart: unless-stopped

  worker:
    restart: unless-stopped

  web:
    build:
      args:
        # Relative — browser calls /api on the same origin through nginx
        NEXT_PUBLIC_API_URL: /api
    ports: !reset []
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
