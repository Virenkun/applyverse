events {}

http {
  # Big scrape descriptions; allow generous bodies and timeouts
  client_max_body_size 5m;
  proxy_read_timeout 120s;

  upstream applyverse_web { server web:3000; }
  upstream applyverse_api { server api:8000; }

  server {
    listen 80;
    server_name _;

    # Next.js owns /api/auth/* (login/logout) — longest-prefix match wins
    location /api/auth/ {
      proxy_pass http://applyverse_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI under the same origin → no CORS, no baked-in IP in the bundle
    location /api/ {
      proxy_pass http://applyverse_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → the Next.js app
    location / {
      proxy_pass http://applyverse_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
